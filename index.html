<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="3600">
<title>Namaz Vakitleri - Traun</title>

<style>
body {
    background-color: white;
    color: black;
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 0;
}

h1 {
    font-size: 60px;
    margin-top: 40px;
}

.location {
    font-size: 28px;
    color: green;
    margin-bottom: 10px;
}

.date {
    font-size: 26px;
    margin-bottom: 30px;
}

.prayer-container {
    width: 60%;
    margin: auto;
}

.prayer {
    font-size: 48px;
    padding: 20px;
    margin: 15px 0;
    border-bottom: 2px solid #ddd;
}

.next {
    color: green;
    font-weight: bold;
    font-size: 54px;
}

.time {
    float: right;
}
</style>
</head>

<body>

<h1>Namaz Vakitleri</h1>
<div class="location">Traun, Oberösterreich</div>
<div class="date" id="date"></div>

<div class="prayer-container" id="times"></div>

<script>

const city = "Traun";
const country = "Austria";

async function loadPrayerTimes() {

    const response = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${city}&country=${country}&method=13`);
    const data = await response.json();
    const timings = data.data.timings;
    const readableDate = data.data.date.readable;

    document.getElementById("date").innerText = readableDate;

    const prayers = [
        { name: "İmsak", time: timings.Fajr },
        { name: "Güneş", time: timings.Sunrise },
        { name: "Öğle", time: timings.Dhuhr },
        { name: "İkindi", time: timings.Asr },
        { name: "Akşam", time: timings.Maghrib },
        { name: "Yatsı", time: timings.Isha }
    ];

    const now = new Date();
    let nextPrayerIndex = -1;

    prayers.forEach((prayer, index) => {
        const [hour, minute] = prayer.time.split(":");
        const prayerDate = new Date();
        prayerDate.setHours(hour, minute, 0);

        if (nextPrayerIndex === -1 && prayerDate > now) {
            nextPrayerIndex = index;
        }
    });

    if (nextPrayerIndex === -1) {
        nextPrayerIndex = 0; // Wenn alle vorbei sind → nächster Tag İmsak
    }

    let html = "";

    prayers.forEach((prayer, index) => {
        html += `
        <div class="prayer ${index === nextPrayerIndex ? 'next' : ''}">
            ${prayer.name}
            <span class="time">${prayer.time}</span>
        </div>`;
    });

    document.getElementById("times").innerHTML = html;
}

loadPrayerTimes();

</script>

</body>
</html>
