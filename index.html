<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="3600">
    <title>Namaz Vakitleri - Traun</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: white;
            color: black;

            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* HEADER */
        .header {
            background: linear-gradient(90deg, #0a7f3f, #0f9d58);
            color: white;
            text-align: center;
            padding: 3vh 2vw;
        }

        .header h1 {
            margin: 0;
            font-size: clamp(28px, 5vw, 60px);
            letter-spacing: 2px;
        }

        .location {
            font-size: clamp(16px, 2.5vw, 24px);
            margin-top: 10px;
        }

        /* DATE */
        .date-container {
            margin-top: 20px;
            font-size: 22px;
            text-align: center;
        }



        /* GRID */
        .container {
            width: 90%;
            margin: 40px auto;
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 35px;
        }


        /* CARDS */
        .card {
            background: #f5f5f5;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            font-size: 54px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            transition: all 0.4s ease;
        }

        .card.next {
            background: #0a7f3f;
            color: white;
            transform: scale(1.08);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.25);
            border: 4px solid #0f9d58;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(10, 127, 63, 0.7);
            }

            70% {
                box-shadow: 0 0 0 30px rgba(10, 127, 63, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(10, 127, 63, 0);
            }
        }

        .time {
            .time {
                font-size: clamp(50px, 8vw, 90px);

            }

            margin-top: 10px;
            font-weight: 900;
        }


        /* COUNTDOWN */
        .countdown {
            text-align: center;
            font-size: 54px;
            margin-top: 20px;
            color: #0a7f3f;
            font-weight: bold;
        }





        /* Tablet */
        @media screen and (max-width: 1024px) {
            .container {
                grid-template-columns: repeat(2, 1fr);
            }

            .card {
                padding: 35px;
                font-size: 38px;
            }

            .time {
                font-size: 48px;
            }
        }

        /* Handy */
        @media screen and (max-width: 600px) {
            .container {
                grid-template-columns: 1fr;
            }

            .card {
                padding: 25px;
                font-size: 32px;
            }

            .time {
                font-size: 40px;
            }

            .header h1 {
                font-size: 40px;
            }

            #clock {
                font-size: 22px;
            }
        }

        #hadithText {
            font-size: 48px;
            line-height: 1.2;
            font-weight: lighter;

        }

        #hadithSource {
            color: #0a7f3f;
            font-size: 32px;
            margin-left: 20px;
            white-space: nowrap;
            /* Quelle bleibt neben Text */
        }

        .bottom-section {
            width: 90%;
            margin: 40px auto;
            display: flex;
            gap: 30px;
        }

        /* Beide Boxen gleich groß */
        .info-box,
        .hadith-container {
            flex: 1;
            padding: 25px;
            background: #f3f3f3;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        /* Titel Stil */
        .info-box {
            font-size: 28px;

            color: #000000;
            text-align: center;
        }

        .hadith-container h2 {
            color: #0a7f3f;
            margin-bottom: 15px;
            font-size: 32px;
        }

        .info-box h2 {
            color: #0a7f3f;
            margin-bottom: 15px;
            font-size: 32px;
        }

        .vakti-start {
            animation: fadeInPulse 1.5s ease-in-out infinite;
            color: #0a7f3f;
            font-weight: bold;
        }

        @keyframes fadeInPulse {
            0% {
                opacity: 0.4;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.05);
            }

            100% {
                opacity: 0.4;
                transform: scale(1);
            }
        }

        /* Responsive für Handy */
        @media screen and (max-width: 900px) {
            .bottom-section {
                flex-direction: column;
            }
        }

        /* TV Hochformat (vertikal) */
        @media screen and (orientation: portrait) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* TV Querformat (horizontal) */
        @media screen and (orientation: landscape) {
            .container {
                grid-template-columns: repeat(6, 1fr);
            }
        }

        /* FOOTER */
        /* .footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            text-align: center;
            font-size: clamp(14px, 2vw, 18px);
            max-height: 200px;
            margin-top: 40px;
        } */
        .footer {
            margin-top: auto;
            text-align: center;
            padding: 20px;
        }

        .footer img {
            max-width: 300px;
            width: 20vw;
            height: auto;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Namaz Vakitleri</h1>
        <div class="location">Traun, Oberösterreich</div>
        <div id="clock" style="font-size:28px; margin-top:10px; font-weight:bold;"></div>
    </div>
    <div class="date-container">
        <div id="miladi"></div>
        <div id="hicri"></div>
    </div>

    <div class="countdown" id="countdown"></div>



    <div class="container" id="times"></div>

    <!-- <div class="bottom-section">

        <div class="info-box">
            <h2>Bilgilendirme:</h2>
            Sabah namazı, İmsak vaktinden 30 dakika sonra kılınır.
            <br>
            Das Morgengebet wird 30 Minuten nach Imsak verrichtet.
        </div>

        <div class="hadith-container">
            <h2>Hadis-i Şerif</h2>
            <p id="hadithText"></p>
            <span id="hadithSource"></span>
        </div>

    </div>
-->
    <div class="footer">
        <img src="Alif Traun Logo - LOGO Alif Traun Subesi.jpg" alt="">
    </div>

    <script>

        const city = "Traun";
        const country = "Austria";

        let nextPrayerTime = null;
        let nextPrayerName = "";

        async function loadPrayerTimes() {

            try {

                const now = new Date();

                // Erst HEUTIGE Zeiten laden um Yatsı zu prüfen
                const todayResponse = await fetch(
                    `https://api.aladhan.com/v1/timings?latitude=48.2266&longitude=14.2346&method=13&tune=2,0,0,0,0,0,1,0,0`
                );

                const todayData = await todayResponse.json();
                const todayTimings = todayData.data.timings;

                // Yatsı Uhrzeit holen
                const [yHour, yMinute] = todayTimings.Isha.split(":");
                const yatsiTime = new Date();
                yatsiTime.setHours(yHour, yMinute, 0);

                // +15 Minuten
                yatsiTime.setMinutes(yatsiTime.getMinutes() + 15);

                let targetDate = now;

                // Wenn aktuelle Zeit nach Yatsı + 15 min → morgen anzeigen
                if (now > yatsiTime) {
                    targetDate = new Date();
                    targetDate.setDate(now.getDate() + 1);
                }

                const day = targetDate.getDate();
                const month = targetDate.getMonth() + 1;
                const year = targetDate.getFullYear();

                // Ziel-Datum laden
                const response = await fetch(
                    `https://api.aladhan.com/v1/timings/${day}-${month}-${year}?latitude=48.2266&longitude=14.2346&method=13`
                );


                const data = await response.json();
                const timings = data.data.timings;

                document.getElementById("miladi").innerText =
                    "Miladi: " + data.data.date.readable;

                const hijri = data.data.date.hijri;

                document.getElementById("hicri").innerText =
                    "Hicri: " +
                    hijri.day + " " +
                    hijri.month.en + " " +
                    hijri.year;

                function addMinutes(timeString, minutes) {
                    const [hour, minute] = timeString.split(":").map(Number);
                    const date = new Date();
                    date.setHours(hour, minute + minutes, 0);

                    return date.getHours().toString().padStart(2, "0") + ":" +
                        date.getMinutes().toString().padStart(2, "0");
                }

                const prayers = [
                    { name: "İmsak", time: addMinutes(timings.Fajr, 1) },        // +1
                    { name: "Güneş", time: timings.Sunrise },
                    { name: "Öğle", time: timings.Dhuhr },
                    { name: "İkindi", time: timings.Asr },
                    { name: "Akşam", time: addMinutes(timings.Maghrib, -1) },    // -1
                    { name: "Yatsı", time: addMinutes(timings.Isha, -8) }        // -8
                ];


                const currentTime = new Date();
                let nextIndex = -1;

                prayers.forEach((prayer, index) => {
                    const [hour, minute] = prayer.time.split(":");
                    const prayerDate = new Date();
                    prayerDate.setHours(hour, minute, 0);

                    if (nextIndex === -1 && prayerDate > currentTime) {
                        nextIndex = index;
                        nextPrayerTime = prayerDate;
                        nextPrayerName = prayer.name;
                    }
                });

                if (nextIndex === -1) {

                    const [hour, minute] = prayers[0].time.split(":");

                    const tomorrow = new Date();
                    tomorrow.setDate(tomorrow.getDate() + 1);
                    tomorrow.setHours(hour, minute, 0);

                    nextPrayerTime = tomorrow;
                    nextPrayerName = prayers[0].name;

                    nextIndex = 0;
                }

                let html = "";

                prayers.forEach((prayer, index) => {

                    html += `
                        <div class="card ${index === nextIndex ? 'next' : ''}">
                            <div>${prayer.name}</div>
                            <div class="time">${prayer.time}</div>
                        </div>`;
                });

                document.getElementById("times").innerHTML = html;

            } catch (error) {
                document.getElementById("times").innerHTML =
                    "<div style='color:red;font-size:30px;text-align:center;'>Veri yüklenemedi</div>";
                console.error(error);
            }
        }

        function updateCountdown() {
            if (!nextPrayerTime) return;

            const now = new Date();
            const diff = nextPrayerTime - now;

            if (diff <= 0) {

                const countdown = document.getElementById("countdown");

                countdown.innerText = nextPrayerName + " vakti başladı";
                countdown.classList.add("vakti-start");

                // Neue Zeiten laden nach 10 Sekunden
                setTimeout(loadPrayerTimes, 10000);

                return;
            } else {
                document.getElementById("countdown").classList.remove("vakti-start");
            }

            let hours = Math.floor(diff / (1000 * 60 * 60));
            let minutes = Math.floor((diff / (1000 * 60)) % 60);
            let seconds = Math.floor((diff / 1000) % 60);

            hours = hours.toString().padStart(2, '0');
            minutes = minutes.toString().padStart(2, '0');
            seconds = seconds.toString().padStart(2, '0');

            // Text automatisch ändern
            let displayName = nextPrayerName;

            if (nextPrayerName === "İmsak") {
                displayName = "Sahur ve İmsak";
            }

            if (nextPrayerName === "Akşam") {
                displayName = "İftar ve Akşam";
            }

            document.getElementById("countdown").innerText =
                displayName + " için kalan süre: " +
                hours + ":" + minutes + ":" + seconds;
        }
        const hadithList = [

            { text: "Ameller niyetlere göredir.", source: "Buhari, Müslim" },
            { text: "Temizlik imanın yarısıdır.", source: "Müslim" },
            { text: "Kolaylaştırın, zorlaştırmayın.", source: "Buhari" },
            { text: "Sizin en hayırlınız Kur'an'ı öğrenen ve öğretendir.", source: "Buhari" },
            { text: "Müminler birbirini sevmekte bir beden gibidir.", source: "Buhari, Müslim" },

            { text: "Güzel söz sadakadır.", source: "Buhari, Müslim" },
            { text: "Komşusu açken tok yatan bizden değildir.", source: "Taberani" },
            { text: "Merhamet etmeyene merhamet edilmez.", source: "Buhari" },
            { text: "Allah sabredenlerle beraberdir.", source: "Buhari, Müslim" },
            { text: "İnsanların en hayırlısı insanlara faydalı olandır.", source: "Darekutni" },

            { text: "Sadaka malı eksiltmez.", source: "Müslim" },
            { text: "Selamı aranızda yayın.", source: "Müslim" },
            { text: "Öfke şeytandandır.", source: "Ebu Davud" },
            { text: "Zalim de olsa mazlum da olsa kardeşine yardım et.", source: "Buhari" },
            { text: "Allah temizdir, temizliği sever.", source: "Tirmizi" },

            { text: "İman yetmişten fazla şubedir.", source: "Müslim" },
            { text: "Dünya mümine zindandır.", source: "Müslim" },
            { text: "En değerli amel vaktinde kılınan namazdır.", source: "Buhari" },
            { text: "İki nimet vardır ki çoğu insan onları kaybeder: sağlık ve boş vakit.", source: "Buhari" },
            { text: "Müslüman, elinden ve dilinden insanların güvende olduğu kimsedir.", source: "Buhari, Müslim" },

            { text: "Cömert kişi Allah’a yakındır.", source: "Tirmizi" },
            { text: "İlim öğrenmek her Müslümana farzdır.", source: "İbn Mace" },
            { text: "Hayâ imandandır.", source: "Buhari, Müslim" },
            { text: "Kolaylaştırıcı olun.", source: "Müslim" },
            { text: "Allah’ın rahmeti gazabını geçmiştir.", source: "Buhari, Müslim" },

            { text: "Dua ibadetin özüdür.", source: "Tirmizi" },
            { text: "Mümin, başkasını kendine tercih eder.", source: "Haşr Suresi 9 (anlam)", source: "Kur'an" },
            { text: "Güçlü mümin, zayıf müminden daha hayırlıdır.", source: "Müslim" },
            { text: "Sözünüzde dürüst olun.", source: "Buhari" },
            { text: "Kıyamet günü en ağır gelen amel güzel ahlaktır.", source: "Tirmizi" },

            { text: "Allah sabredenleri sever.", source: "Ali İmran 146 (anlam)", source: "Kur'an" },
            { text: "İyilik yap, kötülüğü siler.", source: "Tirmizi" },
            { text: "En hayırlı sadaka gizli verilendir.", source: "Buhari" },
            { text: "Komşu hakkı büyüktür.", source: "Buhari" },
            { text: "İki günü eşit olan zarardadır.", source: "Deylemi" },

            { text: "Affeden kişi izzet kazanır.", source: "Müslim" },
            { text: "Allah’ın en sevdiği amel devamlı olandır.", source: "Buhari" },
            { text: "İnsanlara merhamet etmeyen, Allah’tan merhamet göremez.", source: "Buhari" },
            { text: "İman kalpteki tasdiktir.", source: "Müslim (anlam)" },
            { text: "Sabır zaferin anahtarıdır.", source: "Buhari" },

            { text: "Cennetin anahtarı namazdır.", source: "Tirmizi" },
            { text: "Gıybet etmeyin.", source: "Hucurat 12 (anlam)", source: "Kur'an" },
            { text: "Allah temiz kulları sever.", source: "Buhari" },
            { text: "İnsanların en değerlisi takva sahibidir.", source: "Hucurat 13 (anlam)", source: "Kur'an" },
            { text: "Bir iyiliğe vesile olan, onu yapan gibidir.", source: "Tirmizi" }

        ];

        function loadDailyHadith() {
            const today = new Date();
            const dayIndex = today.getDate() % hadithList.length;
            document.getElementById("hadithText").innerText = hadithList[dayIndex].text;
            document.getElementById("hadithSource").innerText = hadithList[dayIndex].source;
        }
        function updateClock() {
            const now = new Date();

            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();

            // führende Null hinzufügen
            hours = hours < 10 ? "0" + hours : hours;
            minutes = minutes < 10 ? "0" + minutes : minutes;
            seconds = seconds < 10 ? "0" + seconds : seconds;

            document.getElementById("clock").innerText =
                hours + ":" + minutes + ":" + seconds;
        }


        loadPrayerTimes().then(() => {
            updateCountdown();
            setInterval(updateCountdown, 1000);
        });
        setInterval(updateClock, 1000);
        updateClock();
        loadDailyHadith();
    </script>

</body>

</html>
